<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo - Gonzalo López | Mobile Developer</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Favicon -->
    <link href="/assets/img/favicon.png" rel="icon">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Raleway:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <!-- Theme -->
    <script src="/src/js/theme.js"></script>

    <style>
        .article-section {
            padding: 60px 0;
            min-height: 60vh;
        }
        .article-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .article-header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 16px;
            line-height: 1.3;
        }
        .article-meta {
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .article-body {
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        .article-body h2 {
            font-size: 28px;
            margin-top: 40px;
            margin-bottom: 20px;
            color: var(--text-heading);
        }
        .article-body h3 {
            font-size: 22px;
            margin-top: 32px;
            margin-bottom: 16px;
            color: var(--text-heading);
        }
        .article-body p {
            margin-bottom: 20px;
        }
        .article-body pre {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 24px 0;
        }
        .article-body code {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }
        .article-body ul, .article-body ol {
            margin-bottom: 20px;
            padding-left: 24px;
        }
        .article-body li {
            margin-bottom: 8px;
        }
        .article-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 24px 0;
        }
        .article-body blockquote {
            border-left: 4px solid var(--accent-primary);
            padding-left: 20px;
            margin: 24px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: var(--accent-hover);
            transform: translateX(-5px);
        }
        .article-loading {
            text-align: center;
            padding: 60px 0;
        }
    </style>
</head>
<body>
    <!-- Navbar Container -->
    <div id="navbar-container" data-transparent="false"></div>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <a href="/articles" class="back-link" style="color: rgba(255,255,255,0.8);">
                <i class="bi bi-arrow-left"></i> Volver a Artículos
            </a>
        </div>
    </section>

    <!-- Article Section -->
    <section class="article-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <article>
                        <div class="article-header">
                            <h1 id="articleTitle">Cargando...</h1>
                            <div class="article-meta">
                                <i class="bi bi-calendar3"></i>
                                <span id="articleDate"></span>
                            </div>
                        </div>
                        <div class="article-body" id="articleContent">
                            <div class="article-loading">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Cargando...</span>
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer">
        <div class="container footer-content">
            <div class="copyright">
                &copy; <span id="year"></span> <strong><span>Gonzalo López - Mobile Developer</span></strong>
            </div>
            <div class="privacy">
                <a href="/privacy-policy" target="_blank">Política de Privacidad</a>
            </div>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <a href="#" class="back-to-top" id="backToTop" aria-label="Back to top">
        <i class="bi bi-arrow-up"></i>
    </a>

    <script src="/src/components/navbar.js"></script>
    <script src="/src/js/article.js"></script>
</body>
</html>
